# Supabase DB backup → Hostinger (FTP)
# Runs every 6 hours. Secrets: SUPABASE_DB_URL, FTP_HOST, FTP_USER, FTP_PASSWORD, FTP_REMOTE_DIR
# To save outside public_html (root-level): use FTP user whose home = backup folder, set FTP_REMOTE_DIR=.
# Repo: https://github.com/vijaychandar33/Credilo-App

name: Supabase backup to Hostinger

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PGSSLMODE: require
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/apt.postgresql.org.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Dump Supabase DB
        run: |
          set -e
          # Trim newlines/spaces (pasted secrets often have trailing newline)
          SUPABASE_DB_URL=$(printf '%s' "$SUPABASE_DB_URL" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL is empty. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Running pg_dump (no Docker)..."
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" --no-owner --no-acl -f backup.sql
          gzip -f backup.sql
          mv backup.sql.gz "backup-$(date -u +%Y%m%d-%H%M).sql.gz"
          echo "Dump done: $(ls -la backup-*.sql.gz)"

      - name: Upload to Hostinger via FTP
        run: |
          set -e
          ENCODED_DIR=$(echo "$FTP_REMOTE_DIR" | sed 's/ /%20/g')
          FILE=$(ls backup-*.sql.gz)
          echo "Uploading $FILE to FTP..."
          curl -T "$FILE" "ftp://$FTP_HOST/$ENCODED_DIR/" --user "$FTP_USER:$FTP_PASSWORD" --ftp-create-dirs --ftp-pasv --connect-timeout 30 --max-time 300 -v
          # If backup is under public_html, deny web access
          printf '%s\n' 'Require all denied' 'Deny from all' > .htaccess
          curl -T .htaccess "ftp://$FTP_HOST/$ENCODED_DIR/" --user "$FTP_USER:$FTP_PASSWORD" --ftp-pasv --connect-timeout 15 -sS -o /dev/null || true
          echo "Upload finished."
